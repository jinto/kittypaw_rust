[package]
id = "news-digest-kr"
name = "오늘의 뉴스 요약"
version = "1.0.0"
description = "매일 아침 구글 뉴스에서 주요 기사를 가져와 LLM으로 한 줄 요약 후 텔레그램으로 전송합니다."
author = "KittyPaw Team"
category = "news"
tags = ["news", "telegram", "daily", "llm", "google-news"]
setup_notes = "이 스킬을 사용하려면 텔레그램 봇이 필요합니다. 아래 단계를 따라 설정하세요."

[trigger]
type = "schedule"
cron = "0 8 * * *"

[permissions]
primitives = ["Http", "Telegram", "Llm"]
allowed_hosts = ["news.google.com"]

[[config.fields]]
key = "telegram_token"
label = "텔레그램 봇 토큰"
type = "secret"
required = true
setup_guide = "1. 텔레그램에서 @BotFather 를 검색\n2. /newbot 명령어 입력\n3. 봇 이름과 username 설정\n4. 받은 토큰을 여기에 붙여넣기"

[[config.fields]]
key = "chat_id"
label = "텔레그램 채팅 ID"
type = "string"
required = true
setup_guide = "1. 만든 봇에게 아무 메시지를 보내기\n2. @userinfobot 에게 메시지를 보내면 채팅 ID 확인 가능"

[[config.fields]]
key = "category"
label = "뉴스 카테고리"
type = "select"
required = false
default = "경제"
options = ["정치", "경제", "사회", "IT과학", "세계"]

[[config.fields]]
key = "count"
label = "요약할 기사 수"
type = "number"
required = false
default = "5"
hint = "요약할 기사 수"
